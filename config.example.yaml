# mail-to-gmail configuration
#
# Two sections:
#   destinations: named Gmail accounts (one block per account).
#   sources:      one entry per mailbox you want to sync. Each entry points
#                 at a destination by name and carries its own schedule +
#                 filter.
#
# Secrets (API keys, app passwords) live in .env, keyed by credentialsPrefix.
# Copy this file to config.yaml and edit in place.
#
# This file shows the minimum needed to get started; see the "Full config
# reference" in README.md for every available field and its default.

destinations:
  - name: gmail-1
    credentialsPrefix: GMAIL_1       # → GMAIL_1_EMAIL, GMAIL_1_APP_PASSWORD

  - name: gmail-2
    credentialsPrefix: GMAIL_2

sources:
  # Zoho Mail (Free plan compatible — uses Zoho's HTTP API, not IMAP).
  - name: zoho-main
    type: zoho-api
    credentialsPrefix: ZOHO_MAIN     # → ZOHO_MAIN_DC, ZOHO_MAIN_CLIENT_ID, …
    destination: gmail-1
    schedule:
      intervalMinutes: 5
      lookbackDays: 1
      maxMessagesPerRun: 100

  # Yahoo — IMAP + app password (preset fills host/port/tls).
  - name: yahoo-personal
    type: imap
    preset: yahoo
    credentialsPrefix: YAHOO_PERSONAL   # → YAHOO_PERSONAL_EMAIL, YAHOO_PERSONAL_APP_PASSWORD
    destination: gmail-2
    idle: true
    schedule: { intervalMinutes: 10, lookbackDays: 1, maxMessagesPerRun: 100 }

  # Personal outlook.com / hotmail — IMAP + app password.
  - name: outlook-personal
    type: imap
    preset: outlook
    credentialsPrefix: OUTLOOK_PERSONAL
    destination: gmail-2
    idle: true
    schedule: { intervalMinutes: 10, lookbackDays: 1, maxMessagesPerRun: 100 }
